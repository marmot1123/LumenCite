name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS は Universal Binary (arm64 + x86_64 を 1 つの .app に lipo) を
          # macos-14 (Apple Silicon) ランナーでビルドする。
          # macos-13 (Intel) ランナーは供給不足で恒常的に queue 待ちが長いため使わない。
          - platform: macos-14
            # --config で pdfium 同梱のオーバーレイをマージ（CI ビルド時のみ。dev/テストには影響しない）。
            # tauri-action はリポジトリルートを cwd にするためパスは src-tauri/ から書く。
            args: "--target universal-apple-darwin --config src-tauri/tauri.release-macos.conf.json"
            label: macos-universal
          - platform: ubuntu-22.04
            args: ""
            label: linux-x64
          # Windows は CI に含めない。Certum SimplySign(クラウド HSM) はトレイ GUI への
          # 対話ログインが必須で、GitHub ホストランナーの非対話セッションでは GUI が
          # 描画されず無人署名できない（公式にヘッドレス手段なし）。署名済み Windows
          # インストーラはリリース担当が一時 Windows VM 上で `tauri build` して生成し、
          # ドラフトリリースへ手動添付する。手順は docs/RELEASE.md §2 を参照。

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # v0.1.0 はプレースホルダ pubkey (REPLACE_WITH_TAURI_SIGNER_PUBKEY) のままタグされ、
      # updater が base64 デコードで `Invalid symbol 95, offset 7.` を出して壊れた。再発防止に、
      # 署名ビルド前に updater 設定が本物の鍵かを検証してタグ build を即座に止める。
      - name: Guard against placeholder updater pubkey
        run: |
          python3 - <<'PY'
          import json, sys
          cfg = json.load(open("src-tauri/tauri.conf.json"))
          up = cfg.get("plugins", {}).get("updater", {})
          pubkey = up.get("pubkey", "")
          if (not pubkey) or pubkey.startswith("REPLACE") or "PUBKEY" in pubkey.upper():
              print(f"::error::updater pubkey looks like a placeholder: {pubkey!r}. "
                    "Set the real key before tagging a release.")
              sys.exit(1)
          print("updater pubkey OK (not a placeholder)")
          PY

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust target
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # OCR 用 pdfium (Universal) を取得して bundle.macOS.frameworks の参照先へ置く。
      - name: Download pdfium (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          mkdir -p src-tauri/pdfium tmp-pdfium
          curl -fL -o tmp-pdfium/pdfium.tgz \
            https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-mac-univ.tgz
          tar -xzf tmp-pdfium/pdfium.tgz -C tmp-pdfium
          cp tmp-pdfium/lib/libpdfium.dylib src-tauri/pdfium/libpdfium.dylib
          rm -rf tmp-pdfium

      # ── macOS 署名用 keychain セットアップ ──────────────────────
      - name: Import macOS signing certificate
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      # Linux はコード署名なしで配布。Windows は CI 対象外（上のマトリクス注記参照）。

      - name: Build & sign with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS 署名 / notarization
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri updater 署名鍵 (ed25519)。全プラットフォームで成果物に署名するが、
          # latest.json は macOS ジョブのみが生成する（下記 includeUpdaterJson 参照）。
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LumenCite ${{ github.ref_name }}"
          releaseBody: |
            See [CHANGELOG.md](https://github.com/marmot1123/lumencite/blob/main/CHANGELOG.md) for the full list of changes.

            ## Downloads

            - **macOS (Universal — Apple Silicon + Intel)** — `.dmg` (signed + notarized)
            - **Windows** — `.msi` / `.exe` installer (signed with Certum; added at release time)
            - **Linux** — `.AppImage`, `.deb`, `.rpm`

            ## Notes

            - The auto-updater is **enabled on macOS** (signed updates). **Windows and Linux** update by manual download from this page.
          releaseDraft: true
          prerelease: false
          # latest.json は macOS ジョブのみ生成（macOS のみ auto-updater 有効）。
          # Windows は VM 手動署名のため CI 非対象。
          includeUpdaterJson: ${{ startsWith(matrix.platform, 'macos') }}
          args: ${{ matrix.args }}

      - name: Cleanup macOS keychain
        if: startsWith(matrix.platform, 'macos') && always()
        run: |
          security delete-keychain build.keychain || true
