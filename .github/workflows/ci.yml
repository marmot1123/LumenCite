name: CI

# PR / push 用の軽量チェック（CR-030）。以前は release ワークフローしか無く、476 の Rust
# テストも拡張機能テストも PR で走らなかったため、P0（Trash purge）やコマンド未登録を検出
# できなかった。ここで frontend ビルド・Rust テスト/clippy・拡張テスト/ビルドを回す。
#
# 追補予定（本 PR のスコープ外）: frontend の unit/E2E（Playwright/Tauri）と、
# frontend の invoke() 名と Rust handler 登録を突き合わせる contract テスト。

on:
  pull_request:
  push:
    branches: [main]

# 同一 ref の古い実行はキャンセルして無駄なランナー消費を避ける。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend build + extension tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type-check + build frontend
        run: pnpm build
      - name: Extension tests
        run: pnpm --filter lumencite-clipper test
      - name: Extension build
        run: pnpm --filter lumencite-clipper build

  rust:
    name: Rust test + clippy
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev
      - name: cargo test
        working-directory: src-tauri
        run: cargo test
      # ベースラインの警告は解消済み（CR-039）なので -D warnings で回帰を止める。
      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --all-features -- -D warnings

      # 依存の既知脆弱性を可視化する（CR-031）。現状 quick-xml 0.39.3 が wayland-scanner
      # のビルド時 proc-macro 経由で残る（Linux 限定・信頼済み Wayland プロトコル XML を
      # ビルド時に解析するのみ・実行時の未信頼入力面なし）。upstream 更新までは PR を
      # 止めないよう continue-on-error にしておき、内容はログで確認する。
      - name: cargo audit (advisory, non-blocking)
        working-directory: src-tauri
        continue-on-error: true
        run: |
          cargo install cargo-audit --locked || true
          cargo audit
