<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>LumenCite Clipper</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 520px;
      margin: 32px auto;
      padding: 0 16px;
      color: #202124;
    }
    h1 { font-size: 18px; }
    p { font-size: 13px; color: #5f6368; line-height: 1.6; }
    textarea {
      width: 100%;
      min-height: 72px;
      font-family: ui-monospace, monospace;
      font-size: 12px;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #dadce0;
      border-radius: 6px;
    }
    button {
      margin-top: 10px;
      padding: 6px 16px;
      font-size: 13px;
      border: none;
      border-radius: 6px;
      background: #1a73e8;
      color: #fff;
      cursor: pointer;
    }
    #status { margin-top: 12px; font-size: 13px; }
  </style>
</head>
<body>
  <h1 id="heading">LumenCite Clipper</h1>
  <p id="instructions"></p>
  <textarea id="code"></textarea>
  <br />
  <button id="save"></button>
  <div id="status"></div>
  <script type="module" src="js/options.js"></script>
</body>
</html>
