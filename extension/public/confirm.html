<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>LumenCite</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 300px;
      margin: 0;
      padding: 16px;
      color: #202124;
      background: #fff;
    }
    h1 { font-size: 15px; margin: 0 0 8px; }
    p { font-size: 12.5px; color: #5f6368; line-height: 1.5; margin: 0 0 6px; }
    #entry {
      font-size: 12.5px; font-weight: 600; color: #202124;
      line-height: 1.4; margin: 2px 0 6px;
      word-break: break-word;
    }
    #missing {
      font-size: 12px; font-weight: 600; color: #1a73e8;
      margin: 0 0 14px;
    }
    .actions { display: flex; flex-direction: column; gap: 7px; }
    button {
      width: 100%;
      padding: 7px 12px;
      font-size: 12.5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-align: center;
    }
    #complete { background: #1a73e8; color: #fff; font-weight: 500; }
    #skip { background: #f1f3f4; color: #202124; }
    #always { background: transparent; color: #5f6368; font-size: 12px; }
    @media (prefers-color-scheme: dark) {
      body { color: #e8eaed; background: #292a2d; }
      h1, #entry { color: #e8eaed; }
      p { color: #9aa0a6; }
      #skip { background: #3c4043; color: #e8eaed; }
      #always { color: #9aa0a6; }
    }
  </style>
</head>
<body>
  <h1 id="title"></h1>
  <p id="body"></p>
  <div id="entry"></div>
  <div id="missing"></div>
  <div class="actions">
    <button id="complete"></button>
    <button id="skip"></button>
    <button id="always"></button>
  </div>
  <script type="module" src="js/confirm.js"></script>
</body>
</html>
